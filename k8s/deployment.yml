apiVersion: apps/v1
kind: Deployment
metadata:
  name: pythonapp-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: pythonapp
  template:
    metadata:
      labels:
        app: pythonapp
    spec:
      containers:
      - name: pythonapp
        image: 535002879962.dkr.ecr.us-east-1.amazonaws.com/cloudnautic/pythonapp:latest
        ports:
        - containerPort: 5000
